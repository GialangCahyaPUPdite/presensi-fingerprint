<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendaftaran Pegawai & Sidik Jari Asli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="./vendor/WebSdk.js"></script>
    <script src="./vendor/dp.core.js"></script>
    <script src="./vendor/dp.devices.js"></script>
    <script src="./vendor/dp.authentication.js"></script>
    <link rel="stylesheet" href="css/daftar.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">Registrasi <span>Sidik Jari Asli</span></div>
        <div style="display: flex; align-items: center; gap: 12px">
          <span id="readerStatusBadge" class="device-badge"
            >Memeriksa Reader...</span
          >
          <button
            type="button"
            id="reconnectBtn"
            class="nav-btn"
            style="
              display: none;
              cursor: pointer;
              background: var(--panel-2);
              border-color: var(--accent);
              color: var(--accent);
            "
          >
            Hubungkan Ulang
          </button>
          <a href="index.html" class="nav-btn">Kembali ke Presensi</a>
        </div>
      </div>

      <!-- Kolom Kiri: Form Registrasi -->
      <div class="card">
        <h3 class="card-title">Daftar Pegawai Baru</h3>
        <form id="enrollForm">
          <div class="form-group">
            <label>Nama Lengkap</label>
            <input
              type="text"
              id="inputNama"
              class="form-control"
              placeholder="Contoh: Gilang Cahya Pratama"
              required
            />
          </div>
          <div class="form-group">
            <label>ID Pegawai / NIP</label>
            <input
              type="text"
              id="inputNip"
              class="form-control"
              placeholder="Contoh: NIP-2026-001"
              required
            />
          </div>
          <div class="form-group">
            <label>Jabatan / Divisi</label>
            <input
              type="text"
              id="inputJabatan"
              class="form-control"
              placeholder="Contoh: Software Engineer"
            />
          </div>

          <div class="fp-box" id="fpBox">
            <div class="fp-icon-wrap">
              <svg
                viewBox="0 0 100 100"
                fill="none"
                stroke-width="3.2"
                stroke-linecap="round"
              >
                <path d="M50 20 C30 20 22 35 22 50 C22 68 32 80 50 80" />
                <path d="M50 12 C25 12 14 32 14 50 C14 70 27 86 50 88" />
                <path d="M50 28 C36 28 30 39 30 50 C30 63 38 72 50 72" />
                <path d="M50 36 C42 36 38 43 38 50 C38 58 43 64 50 64" />
              </svg>
            </div>
            <img
              id="capturedFpImg"
              src=""
              alt="Sidik Jari Asli Terekam"
              style="
                display: none;
                max-width: 140px;
                max-height: 160px;
                margin: 10px auto;
                border-radius: 10px;
                border: 2px solid var(--accent);
                box-shadow: 0 0 20px rgba(255, 203, 116, 0.3);
                background: rgba(0, 0, 0, 0.5);
                padding: 6px;
              "
            />
            <div class="fp-status" id="fpStatusText">
              Tempelkan jari ke atas kaca sensor
            </div>
            <div class="fp-desc" id="fpDescText">
              Letakkan jari dengan stabil agar sampel biometrik terekam sempurna
            </div>
          </div>

          <button type="submit" class="btn" id="submitBtn" disabled>
            <span>Simpan & Daftarkan Pegawai</span>
          </button>

          <button type="button" class="btn btn-danger" id="resetAllBtn">
            <span>Hapus Bersih Semua Data (Reset)</span>
          </button>
        </form>
      </div>

      <!-- Kolom Kanan: Daftar Pegawai -->
      <div class="card">
        <h3 class="card-title">
          Pegawai Terdaftar (<span id="empCount">0</span>)
        </h3>
        <ul class="emp-list" id="empList">
          <li
            style="
              color: var(--muted);
              font-size: 14px;
              text-align: center;
              padding: 20px;
            "
          >
            Memuat data pegawai...
          </li>
        </ul>
      </div>
    </div>

    <script src="./fingerprint-bridge.js"></script>
    <script>
      const API_BASE = "http://localhost:3001/api";
      let capturedTemplate = null;
      let liveReaderInstance = null;

      const enrollForm = document.getElementById("enrollForm");
      const inputNama = document.getElementById("inputNama");
      const inputNip = document.getElementById("inputNip");
      const inputJabatan = document.getElementById("inputJabatan");
      const fpBox = document.getElementById("fpBox");
      const fpStatusText = document.getElementById("fpStatusText");
      const fpDescText = document.getElementById("fpDescText");
      const submitBtn = document.getElementById("submitBtn");
      const resetAllBtn = document.getElementById("resetAllBtn");
      const empList = document.getElementById("empList");
      const empCount = document.getElementById("empCount");
      const readerStatusBadge = document.getElementById("readerStatusBadge");
      const reconnectBtn = document.getElementById("reconnectBtn");
      if (reconnectBtn) {
        reconnectBtn.addEventListener("click", () => {
          readerStatusBadge.textContent = "Menghubungkan ulang...";
          reconnectBtn.style.display = "none";
          FingerprintBridge.reconnect();
        });
      }

      // Gunakan FingerprintBridge yang sudah terbukti sukses terhubung ke hardware DigitalPersona 4500
      FingerprintBridge.on("modeReady", ({ mode }) => {
        if (mode === "live") {
          readerStatusBadge.textContent = "Reader Terhubung [ MODE LIVE ]";
          readerStatusBadge.classList.remove("error");
          if (reconnectBtn) reconnectBtn.style.display = "none";
        } else {
          readerStatusBadge.textContent = "Mode Simulasi / Tes Klik";
          readerStatusBadge.classList.add("error");
          if (reconnectBtn) reconnectBtn.style.display = "inline-flex";
          setupClickFallback();
        }
      });

      FingerprintBridge.on(
        "deviceStatus",
        ({ connected, simulated, error }) => {
          if (connected && !simulated) {
            readerStatusBadge.textContent = "Reader Terhubung [ MODE LIVE ]";
            readerStatusBadge.classList.remove("error");
            if (reconnectBtn) reconnectBtn.style.display = "none";
          } else if (simulated) {
            readerStatusBadge.textContent = "Mode Simulasi / Tes Klik";
            readerStatusBadge.classList.add("error");
            if (reconnectBtn) reconnectBtn.style.display = "inline-flex";
            setupClickFallback();
          } else if (error) {
            readerStatusBadge.textContent = `Reader error: ${error}`;
            readerStatusBadge.classList.add("error");
            if (reconnectBtn) reconnectBtn.style.display = "inline-flex";
          }
        },
      );

      FingerprintBridge.on("quality", ({ q }) => {
        fpBox.classList.add("scanning");
        fpStatusText.textContent = `Membaca kualitas sidik jari: ${Math.round(q * 100)}%...`;
      });

      FingerprintBridge.on("scanCaptured", async (payload) => {
        capturedTemplate =
          payload && payload.samples
            ? payload.samples
            : { raw_scan: Date.now() };
        fpBox.classList.remove("scanning");
        fpBox.classList.add("captured");

        // Ekstrak dan tampilkan bentuk sidik jari sesungguhnya jika sampel berupa gambar PNG (Format 5) atau Base64 PNG
        let imgData = null;
        if (Array.isArray(payload.samples) && payload.samples.length > 0) {
          for (const s of payload.samples) {
            if (s.Data && (s.Format === 5 || typeof s.Data === "string")) {
              imgData =
                typeof s.Data === "string"
                  ? s.Data.replace(/_/g, "/").replace(/-/g, "+")
                  : s.Data;
              break;
            }
          }
        }
        const fpIconWrap = fpBox.querySelector(".fp-icon-wrap");
        const imgEl = document.getElementById("capturedFpImg");
        if (imgData && imgEl) {
          if (fpIconWrap) fpIconWrap.style.display = "none";
          imgEl.src = "data:image/png;base64," + imgData;
          imgEl.style.display = "block";
        }

        fpStatusText.textContent = "Bentuk Sidik Jari Asli Berhasil Terekam!";
        fpDescText.textContent =
          "Sampel sidik jarimu telah disalin dengan jelas. Siap disimpan ke database.";
        submitBtn.disabled = false;

        // Jika user sudah mengisi Nama dan NIP, otomatis salin dan simpan ke database sesuai permintaan
        if (inputNama.value.trim() && inputNip.value.trim()) {
          fpDescText.textContent =
            "Kualitas sidik jari cukup jelas, menyalin dan menyimpan secara otomatis...";
          await new Promise((r) => setTimeout(r, 600));
          enrollForm.dispatchEvent(
            new Event("submit", { cancelable: true, bubbles: true }),
          );
        }
      });

      function setupClickFallback() {
        if (!fpBox.dataset.fallback) {
          fpBox.dataset.fallback = "true";
          fpBox.addEventListener("click", () => {
            capturedTemplate = {
              simulated_biometric: "LOCAL_ENG_" + Date.now(),
            };
            fpBox.classList.add("captured");
            fpStatusText.textContent =
              "Sidik Jari Berhasil Terekam (Simulasi Tes)!";
            fpDescText.textContent = "Siap didaftarkan";
            submitBtn.disabled = false;
          });
          fpStatusText.textContent =
            "Klik kotak ini untuk simulasi scan atau hubungkan reader";
        }
      }

      // Load Employee List from Database
      async function loadEmployees() {
        try {
          const res = await fetch(`${API_BASE}/employees`);
          const data = await res.json();
          empCount.textContent = data.length;

          if (data.length === 0) {
            empList.innerHTML = `<li style="color:var(--muted); font-size:14px; text-align:center; padding: 20px;">Belum ada pegawai terdaftar.</li>`;
            return;
          }

          empList.innerHTML = data
            .map(
              (emp) => `
        <li class="emp-item">
          <div class="emp-info">
            <h4>${emp.nama} <span class="emp-badge">${emp.template ? "✔ Sidik Jari Asli" : "Tanpa Sidik Jari"}</span></h4>
            <p>NIP: ${emp.id_pegawai} | ${emp.jabatan || "-"}</p>
          </div>
          <button class="del-btn" onclick="deleteEmployee(${emp.id}, '${emp.nama}')">Hapus</button>
        </li>
      `,
            )
            .join("");
        } catch (err) {
          empList.innerHTML = `<li style="color:var(--error); font-size:14px; text-align:center; padding: 20px;">Gagal memuat data dari backend</li>`;
        }
      }

      // Submit Enrollment
      enrollForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!capturedTemplate) {
          alert("Silakan tempelkan jari terlebih dahulu hingga terekam!");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = "<span>Menyimpan ke Database...</span>";

        try {
          const res = await fetch(`${API_BASE}/employees/enroll`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              nama: inputNama.value.trim(),
              id_pegawai: inputNip.value.trim(),
              dp_username: inputNip.value.trim(),
              jabatan: inputJabatan.value.trim(),
              template: capturedTemplate,
            }),
          });

          if (res.ok) {
            alert(
              `Selamat! Pegawai "${inputNama.value.trim()}" dan sidik jari aslinya berhasil didaftarkan!`,
            );
            enrollForm.reset();
            capturedTemplate = null;
            fpBox.classList.remove("captured", "scanning");
            const imgEl = document.getElementById("capturedFpImg");
            if (imgEl) imgEl.style.display = "none";
            const fpIconWrap = fpBox.querySelector(".fp-icon-wrap");
            if (fpIconWrap) fpIconWrap.style.display = "block";
            fpStatusText.textContent = "Tempelkan jari ke atas kaca sensor";
            fpDescText.textContent =
              "Letakkan jari dengan stabil agar sampel biometrik terekam sempurna";
            submitBtn.disabled = true;
            loadEmployees();
          } else {
            const err = await res.json().catch(() => ({}));
            alert(`Gagal mendaftarkan: ${err.error || "Terjadi kesalahan"}`);
          }
        } catch (err) {
          alert("Tidak bisa terhubung ke server backend");
        } finally {
          submitBtn.innerHTML = "<span>Simpan & Daftarkan Pegawai</span>";
        }
      });

      // Reset All Data Button
      resetAllBtn.addEventListener("click", async () => {
        if (
          confirm(
            "PERHATIAN: Apakah kamu yakin ingin menghapus BERSIH semua data pegawai dan riwayat presensi sebelumnya?",
          )
        ) {
          try {
            const res = await fetch(`${API_BASE}/employees/reset`, {
              method: "DELETE",
            });
            if (res.ok) {
              alert(
                "Semua data pegawai dan presensi sebelumnya telah dihapus bersih!",
              );
              loadEmployees();
            } else {
              alert("Gagal mereset data");
            }
          } catch (err) {
            alert("Gagal menghubungi backend");
          }
        }
      });

      // Delete Single Employee
      window.deleteEmployee = async function (id, nama) {
        if (confirm(`Hapus pegawai "${nama}"?`)) {
          try {
            const res = await fetch(`${API_BASE}/employees/${id}`, {
              method: "DELETE",
            });
            if (res.ok) loadEmployees();
            else alert("Gagal menghapus pegawai");
          } catch (err) {
            alert("Gagal menghubungi backend");
          }
        }
      };

      FingerprintBridge.init();
      loadEmployees();
    </script>
  </body>
</html>
