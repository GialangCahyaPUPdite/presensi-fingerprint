<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Presensi Sidik Jari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!--
  ============================================================================
  INTEGRASI DIGITALPERSONA WEBSDK — WAJIB DIBACA
  ============================================================================
  File-file berikut TIDAK disertakan di sini karena berlisensi HID/DigitalPersona
  dan didapat dari instalasi SDK/Web Components kamu sendiri, bukan dari CDN publik:

    - WebSdk.js                     (dari HID DigitalPersona SDK / Lite Client sample)
    - dp.core.js                    (dari paket @digitalpersona/core)
    - dp.devices.js                 (dari paket @digitalpersona/devices)
    - dp.authentication.js          (dari paket @digitalpersona/authentication)

  Taruh file-file itu di folder ./vendor/ di sebelah index.html ini, lalu
  aktifkan baris <script> di bawah. Selama file belum ada, halaman ini otomatis
  jalan di MODE SIMULASI (lihat fingerprint-bridge.js) supaya kamu tetap bisa
  lihat & uji tampilan real-time-nya sekarang juga.
  ============================================================================
-->
    <script src="./vendor/WebSdk.js"></script>
    <script src="./vendor/dp.core.js"></script>
    <script src="./vendor/dp.devices.js"></script>
    <script src="./vendor/dp.authentication.js"></script>

    <style>
      :root {
        --bg: #0e1526;
        --panel: #161f35;
        --panel-2: #1c2740;
        --line: #2a3654;
        --accent: #e8a33d;
        --accent-dim: #6b5228;
        --success: #3fb68b;
        --error: #e15a5a;
        --text: #f5f3ec;
        --muted: #93a0be;
        --display: "Fraunces", serif;
        --body: "Manrope", sans-serif;
        --mono: "IBM Plex Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: radial-gradient(
          1200px 600px at 50% -10%,
          #16203c 0%,
          var(--bg) 60%
        );
        color: var(--text);
        font-family: var(--body);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      .kiosk {
        width: 100%;
        max-width: 1080px;
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 20px;
      }
      @media (max-width: 860px) {
        .kiosk {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 28px;
      }

      /* ---------- Header / clock ---------- */
      .topbar {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 4px 6px 2px;
      }
      .brand {
        font-family: var(--display);
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: var(--text);
      }
      .brand span {
        color: var(--accent);
      }
      .clock {
        font-family: var(--mono);
        color: var(--muted);
        font-size: 14px;
        text-align: right;
      }
      .clock b {
        color: var(--text);
        font-size: 17px;
        letter-spacing: 0.04em;
      }

      /* ---------- Scan panel ---------- */
      .scan-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 460px;
        position: relative;
      }

      .fp-wrap {
        width: 220px;
        height: 220px;
        position: relative;
        margin-bottom: 26px;
      }

      .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid var(--line);
        transition:
          border-color 0.35s ease,
          box-shadow 0.35s ease,
          transform 0.35s ease;
      }
      .ring.r2 {
        inset: 18px;
        opacity: 0.7;
      }
      .ring.r3 {
        inset: 36px;
        opacity: 0.5;
      }

      .fp-wrap.waiting .ring {
        border-color: var(--line);
      }
      .fp-wrap.scanning .ring {
        border-color: var(--accent);
        box-shadow: 0 0 0 0 rgba(232, 163, 61, 0.35);
        animation: pulse 1.1s ease-out infinite;
      }
      .fp-wrap.scanning .ring.r2 {
        animation-delay: 0.12s;
      }
      .fp-wrap.scanning .ring.r3 {
        animation-delay: 0.24s;
      }
      .fp-wrap.success .ring {
        border-color: var(--success);
      }
      .fp-wrap.error .ring {
        border-color: var(--error);
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(232, 163, 61, 0.35);
          transform: scale(1);
        }
        70% {
          box-shadow: 0 0 0 14px rgba(232, 163, 61, 0);
          transform: scale(1.015);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(232, 163, 61, 0);
          transform: scale(1);
        }
      }

      .fp-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .fp-icon svg {
        width: 92px;
        height: 92px;
      }
      .fp-icon path,
      .fp-icon circle {
        stroke: var(--muted);
        transition:
          stroke 0.35s ease,
          opacity 0.35s ease;
      }
      .fp-wrap.scanning .fp-icon path,
      .fp-wrap.scanning .fp-icon circle {
        stroke: var(--accent);
      }
      .fp-wrap.success .fp-icon path,
      .fp-wrap.success .fp-icon circle {
        stroke: var(--success);
      }
      .fp-wrap.error .fp-icon path,
      .fp-wrap.error .fp-icon circle {
        stroke: var(--error);
      }

      /* ridge fill-in animation driven by quality (JS sets --q 0..1) */
      .fp-wrap {
        --q: 0;
      }
      .fp-icon .ridge {
        stroke-dasharray: 1;
        stroke-dashoffset: calc(1 - var(--q));
        pathlength: 1;
      }

      .status-title {
        font-family: var(--display);
        font-size: 26px;
        font-weight: 600;
        margin: 0 0 6px;
        min-height: 32px;
      }
      .status-sub {
        color: var(--muted);
        font-size: 14.5px;
        min-height: 20px;
      }

      .result-name {
        font-family: var(--display);
        font-size: 30px;
        color: var(--success);
      }
      .result-name.error {
        color: var(--error);
      }

      /* ---------- Side panel: live feed ---------- */
      .feed-panel {
        display: flex;
        flex-direction: column;
        min-height: 460px;
      }
      .feed-title {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 14px;
      }
      .feed-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        max-height: 380px;
      }
      .feed-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        animation: slideIn 0.28s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .feed-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        flex-shrink: 0;
      }
      .feed-item.keluar .feed-dot {
        background: var(--accent);
      }
      .feed-name {
        font-weight: 700;
        font-size: 14px;
      }
      .feed-meta {
        color: var(--muted);
        font-size: 12.5px;
        font-family: var(--mono);
      }
      .feed-empty {
        color: var(--muted);
        font-size: 14px;
        padding: 8px 2px;
      }

      .footer-note {
        margin-top: auto;
        padding-top: 14px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid var(--line);
      }
      .mode-pill {
        font-family: var(--mono);
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
      }
      .mode-pill.sim {
        color: var(--accent);
        border-color: var(--accent-dim);
      }
      .mode-pill.live {
        color: var(--success);
        border-color: var(--success);
      }

      .sim-btn {
        background: none;
        border: 1px solid var(--line);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        padding: 8px 14px;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 18px;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .sim-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(232, 163, 61, 0.12);
        border: 1px solid rgba(232, 163, 61, 0.4);
        color: var(--accent);
        padding: 7px 14px;
        border-radius: 99px;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
      }
      .nav-btn:hover {
        background: var(--accent);
        color: #0e1526;
        box-shadow: 0 0 16px rgba(232, 163, 61, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="kiosk">
      <div class="topbar">
        <div style="display: flex; align-items: center; gap: 16px">
          <div class="brand">Presensi <span>Sidik Jari</span></div>
          <a href="daftar.html" class="nav-btn"
            >Pendaftaran Pegawai & Sidik Jari</a
          >
        </div>
        <div class="clock">
          <b id="clockTime">--:--:--</b>
          <div id="clockDate">-</div>
        </div>
      </div>

      <div class="card scan-panel">
        <div class="fp-wrap waiting" id="fpWrap">
          <div class="ring r1"></div>
          <div class="ring r2"></div>
          <div class="ring r3"></div>
          <div class="fp-icon">
            <svg
              viewBox="0 0 100 100"
              fill="none"
              stroke-width="3.2"
              stroke-linecap="round"
            >
              <path
                class="ridge"
                d="M50 20 C30 20 22 35 22 50 C22 68 32 80 50 80"
              />
              <path
                class="ridge"
                d="M50 12 C25 12 14 32 14 50 C14 70 27 86 50 88"
              />
              <path
                class="ridge"
                d="M50 28 C36 28 30 39 30 50 C30 63 38 72 50 72"
              />
              <path
                class="ridge"
                d="M50 36 C42 36 38 43 38 50 C38 58 43 64 50 64"
              />
            </svg>
          </div>
        </div>

        <div class="status-title" id="statusTitle">Tempelkan jari Anda</div>
        <div class="status-sub" id="statusSub">
          Letakkan jari tepat di tengah sensor
        </div>

        <button class="sim-btn" id="simBtn" type="button">
          ▸ Jalankan simulasi scan
        </button>
      </div>

      <div class="card feed-panel">
        <div class="feed-title">Presensi hari ini</div>
        <ul class="feed-list" id="feedList">
          <li class="feed-empty">Belum ada presensi hari ini.</li>
        </ul>

        <div class="footer-note">
          <span id="deviceStatus">Memeriksa reader…</span>
          <button
            type="button"
            id="reconnectBtn"
            class="nav-btn"
            style="
              display: none;
              cursor: pointer;
              background: var(--panel-2);
              border-color: var(--accent);
              color: var(--accent);
              padding: 4px 10px;
              font-size: 11px;
            "
          >
            Hubungkan Ulang
          </button>
          <span class="mode-pill sim" id="modePill">MODE SIMULASI</span>
        </div>
      </div>
    </div>

    <script>
      // ============================================================================
      // KONFIGURASI — sesuaikan dengan environment kamu
      // ============================================================================
      const CONFIG = {
        // URL backend presensi (Express) — lihat backend/server.js
        API_BASE: "http://localhost:3001/api",

        // URL DigitalPersona Authentication Server (DPAM) kamu, untuk identifikasi 1:N.
        // Contoh: 'https://dpam.kantor.local/DPWebAuth'
        DP_AUTH_SERVER: "https://CHANGE-ME.dpam-server.local",

        // Info kiosk ini (dicatat di log presensi supaya tahu presensi dari device mana)
        DEVICE_LABEL: "Kiosk Utama",

        // Berapa lama hasil (nama / error) ditampilkan sebelum kembali ke status siaga
        RESULT_DISPLAY_MS: 3200,
      };
    </script>
    <script src="./fingerprint-bridge.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
